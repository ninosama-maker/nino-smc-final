<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NINO SMC PRO</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'NINO SMC','short_name':'SMC','start_url':'.','display':'standalone','background_color':'#0b0e11','theme_color':'#f0b90b'}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: #eaecef; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .signal-bull { border-left: 5px solid #0ecb81; background: linear-gradient(90deg, #162a21 0%, #0b0e11 100%); }
        .signal-bear { border-left: 5px solid #f6465d; background: linear-gradient(90deg, #2b1a1d 0%, #0b0e11 100%); }
    </style>
</head>
<body class="p-4 pb-24">
    <header class="flex justify-between items-center mb-6 border-b border-gray-800 pb-3">
        <div>
            <h1 class="text-2xl font-black text-yellow-500 tracking-tighter">NINO<span class="text-white ml-1">SMC</span></h1>
            <p class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">Institutional Flow</p>
        </div>
        <div id="status" class="bg-green-500/10 text-green-400 text-[10px] px-3 py-1 rounded-full border border-green-500/20 font-bold uppercase">Socket Live</div>
    </header>

    <div id="signals" class="space-y-4">
        <div class="p-10 bg-gray-900/50 rounded-xl text-gray-500 text-xs text-center border border-dashed border-gray-800">
            <p class="animate-pulse">SCANNING LIQUIDITY POOLS...</p>
            <p class="mt-2 opacity-50">Monitoring BTC | ETH | SOL</p>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#1e2329]/95 backdrop-blur-md p-5 flex justify-around border-t border-gray-800">
        <div class="text-yellow-500 flex flex-col items-center">
            <span class="text-[10px] font-bold">SIGNALS</span>
        </div>
        <div class="text-gray-500 flex flex-col items-center opacity-50">
            <span class="text-[10px] font-bold">ZONES</span>
        </div>
        <div class="text-gray-500 flex flex-col items-center opacity-50">
            <span class="text-[10px] font-bold">HISTORY</span>
        </div>
    </nav>

    <script>
        const pairs = ['btcusdt', 'ethusdt', 'solusdt'];
        const signalsDiv = document.getElementById('signals');

        pairs.forEach(pair => {
            const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@kline_1m`);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data).k;
                if (d.x) { // Candle Close
                    const price = parseFloat(d.c);
                    const open = parseFloat(d.o);
                    const high = parseFloat(d.h);
                    const low = parseFloat(d.l);
                    
                    // SMC DISPLACEMENT LOGIC (Price moves > 0.15% in 1 min)
                    const displacement = Math.abs(price - open) / open;
                    
                    if (displacement > 0.0015) {
                        if (signalsDiv.innerText.includes('SCANNING')) signalsDiv.innerHTML = '';
                        
                        const side = price > open ? 'BULLISH MSS' : 'BEARISH MSS';
                        const css = price > open ? 'signal-bull' : 'signal-bear';
                        const obZone = price > open ? low : high;

                        const card = `
                            <div class="${css} p-5 rounded-lg shadow-2xl mb-4 border border-gray-800/50">
                                <div class="flex justify-between items-start">
                                    <span class="text-xl font-bold">${pair.replace('usdt','').toUpperCase()}</span>
                                    <span class="bg-black/40 text-[10px] px-2 py-1 rounded text-gray-400 font-mono">1M TF</span>
                                </div>
                                <div class="mt-2 text-sm font-bold tracking-tight text-white italic">${side} DETECTED</div>
                                <div class="mt-4 grid grid-cols-2 gap-2 text-[11px] font-medium">
                                    <div class="text-gray-400">ENTRY POI:<br><span class="text-white text-sm">$${price.toLocaleString()}</span></div>
                                    <div class="text-gray-400 text-right">STOP LOSS:<br><span class="text-white text-sm">$${obZone.toLocaleString()}</span></div>
                                </div>
                            </div>
                        `;
                        signalsDiv.insertAdjacentHTML('afterbegin', card);
                    }
                }
            };
        });
    </script>
</body>
</html>
